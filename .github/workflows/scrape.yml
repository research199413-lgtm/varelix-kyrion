name: PSX Indices Scraper

on:
  workflow_dispatch:

  schedule:
    - cron: '0 0 * * 1-5'
    - cron: '0 3 * * 1-5'
    - cron: '30 7 * * 1-5'
    - cron: '0 10 * * 1-5'

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest

    concurrency:
      group: psx-scraper
      cancel-in-progress: true

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run scraper
        run: |
          python scraper.py

      - name: Commit results
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git add data/psx_indices_history.xlsx
          git commit -m "Update PSX indices data" || echo "No changes"
          git push
