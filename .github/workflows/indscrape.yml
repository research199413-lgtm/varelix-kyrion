name: PSX Data Scraper
on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 1-5'      # 5:00 AM PKT (Mon-Fri)
    - cron: '0 3 * * 1-5'      # 8:00 AM PKT (Mon-Fri)
    - cron: '30 7 * * 1-5'     # 12:30 PM PKT (Mon-Fri)
    - cron: '0 10 * * 1-5'     # 3:00 PM PKT (Mon-Fri)    


permissions:
  contents: write

# Prevent multiple runs from pushing at the same time
concurrency:
  group: psx-data
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests beautifulsoup4 lxml html5lib openpyxl

      - name: Run Scraper
        run: python scraper.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Stage all new/modified files
          git add -A

          # Exit if nothing changed
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "Update PSX data $(date -u '+%Y-%m-%d %H:%M:%S UTC')"

          # Rebase to avoid push conflicts
          git pull --rebase origin main

          git push origin HEAD:main
